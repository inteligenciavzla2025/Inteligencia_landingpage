name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy
        run: |
          set -e
          cd /var/www/inteligencia
          git fetch origin main
          git reset --hard origin/main
          docker compose -f docker-compose.app.yml up -d --build
          echo "✅ Deploy completado"
